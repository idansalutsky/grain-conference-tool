# Self-host the WHOLE app (API + built React SPA) as one URL on :8000.
# Runs with ZERO config — `docker compose up` works with no .env and no keys
# (the app degrades gracefully). Add keys later in the in-app UI
# (Settings -> Integrations) or via an optional .env file.
#
# Open http://localhost:8000  -> the SPA. The API is same-origin under /api.
services:
  api:
    build: .
    image: grain-conference-tool:latest
    ports:
      - "8000:8000"
    # Optional: if a .env exists it's loaded; if not, the app still boots.
    env_file:
      - path: .env
        required: false
    environment:
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
      - ./backend/seed:/app/backend/seed:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
