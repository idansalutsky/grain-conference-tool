# Local dev: backend on :8000, frontend optional via `npm run dev`.
services:
  api:
    build: .
    image: grain-conference-tool:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
      - ./backend/seed:/app/backend/seed:ro
    restart: unless-stopped
